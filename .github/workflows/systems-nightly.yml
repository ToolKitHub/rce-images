name: Systems Nightly

on:
  push:
    branches:
      - main
      - fixes

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    name: Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.05
          github_access_token: ${{ secrets.GH_TOKEN }}

      - name: Nix build
        run: |
          nix-build --out-link result/javascript images/languages/javascript.nix

      - name: Load image
        run: |
          docker load -i result/javascript

      - name: Run test
        run: |
          output=$(echo '{
            "language": "javascript",
            "files": [{
              "name": "main.js",
              "content": "console.log(\"Hello World!\");"
            }]
          }' | docker run --rm -i --read-only --tmpfs /tmp:rw,noexec,nosuid,size=65536k --tmpfs /home/rce:rw,exec,nosuid,uid=1000,gid=1000,size=131072k -u rce -w /home/rce toolkithub/javascript:edge)

          echo "Output: ${output}"

          if [[ "${output}" == *"Hello World!"* ]]; then
            echo "Test passed."
          else
            echo "Test failed."
            exit 1
          fi

  paths-filter:
    name: Paths Filter
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.changes.outputs.images }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes in paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            images:
              - 'images/**'

  build-load-push:
    name: Build Load and Push
    needs:
      - build-test
      - paths-filter
    if: ${{ needs.paths-filter.outputs.images == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.05
          github_access_token: ${{ secrets.GH_TOKEN }}

      - name: Nix build
        run: |
          chmod +x ./scripts/build_all.sh
          ./scripts/build_all.sh

      - name: Load images
        run: |
          chmod +x ./scripts/load_all.sh
          ./scripts/load_all.sh

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_HUB_PASSWD }}

      - name: Push images
        run: |
          chmod +x ./scripts/push_all.sh
          ./scripts/push_all.sh
